version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - exhaustive
    - gosec
    - noctx
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gosec:
      excludes:
        - G304 # operator-supplied file paths (e.g. config files), not untrusted user input
        - G703 # path-traversal taint variant of G304, same rationale
    revive:
      rules:
        - name: exported
        - name: error-return
        - name: error-naming
        - name: var-naming
        - name: package-comments
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      - path: _test\.go
        linters:
          - gosec # test fixtures use obviously-fake credentials, not real secrets
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/YASSERRMD/verdex
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
