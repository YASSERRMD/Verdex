version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gosec
    - exhaustive
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/YASSERRMD/verdex
  revive:
    rules:
      - name: exported
      - name: error-return
      - name: error-naming
      - name: var-naming
      - name: package-comments
  gosec:
    excludes:
      - G304 # file path provided as taint input — handled at boundaries

run:
  timeout: 5m
  tests: true
