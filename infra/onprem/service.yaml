# infra/onprem/service.yaml
#
# Phase 094 (packages/iac): on-prem-tier Service fronting the gateway
# Deployment. NodePort rather than infra/cloud's ClusterIP: an on-prem
# installation typically has no external cloud load balancer to
# provision, so the customer's own reverse proxy/firewall is expected
# to forward to a fixed node port instead.
apiVersion: v1
kind: Service
metadata:
  name: verdex-gateway
  namespace: verdex
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: verdex
    verdex.io/tier: onprem
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
    - name: metrics
      port: 9090
      targetPort: metrics
      nodePort: 30090
