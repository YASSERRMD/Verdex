# infra/onprem/configmap.yaml
#
# Phase 094 (packages/iac): non-secret configuration for the on-prem
# tier, for customers running a local Kubernetes distribution (k3s,
# RKE2, MicroK8s) rather than plain docker-compose.yml (both forms are
# provided in this directory -- see doc/deployment.md for why). No
# VERDEX_DATARESIDENCY_REGION key here, deliberately: an on-prem
# deployment's data resides on the customer's own hardware, not a
# selected cloud region.
apiVersion: v1
kind: ConfigMap
metadata:
  name: verdex-onprem-config
  namespace: verdex
  labels:
    app.kubernetes.io/part-of: verdex
    verdex.io/tier: onprem
data:
  VERDEX_PROFILE: "onprem"
  VERDEX_SERVER_PORT: "8080"
  VERDEX_METRICS_PORT: "9090"
