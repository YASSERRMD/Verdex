# infra/cloud/docker-compose.yml
#
# Phase 094 (packages/iac): reference cloud-tier composition for local
# smoke-testing this tier's shape before it is translated to whatever
# managed-Kubernetes/ECS the target cloud provider actually runs. This
# is NOT the production cloud topology (a managed Postgres, a managed
# secret store, and autoscaling replace the "postgres" service and
# fixed replica counts below in a real cloud account) -- see
# k8s-deployment.yaml/k8s-service.yaml in this same directory for the
# orchestration-manifest half of this tier, and
# packages/iac/doc/deployment.md for why both forms are committed.
#
# Every env var here follows packages/config's VERDEX_-prefixed
# convention (packages/config/env.go's EnvPrefix), and every secret
# value is a reference, never a literal -- see
# packages/config/secrets.go's env://VAR_NAME scheme, composing with
# packages/keymanagement (Phase 076) and packages/encryption (Phase
# 075) for what actually backs each referenced secret. No value in
# this file is a real credential.

services:
  gateway:
    image: verdex/gateway:${VERDEX_IMAGE_TAG:-latest}
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      VERDEX_PROFILE: cloud
      VERDEX_SERVER_PORT: "8080"
      VERDEX_METRICS_PORT: "9090"
      VERDEX_DATABASE_DSN: "env://VERDEX_DATABASE_DSN"
      VERDEX_ENCRYPTION_KEY: "env://VERDEX_ENCRYPTION_KEY"
      VERDEX_DATARESIDENCY_REGION: "${VERDEX_DATARESIDENCY_REGION:-eu-west-1}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  router:
    image: verdex/router:${VERDEX_IMAGE_TAG:-latest}
    environment:
      VERDEX_PROFILE: cloud
      VERDEX_SERVER_PORT: "8081"
      VERDEX_DATABASE_DSN: "env://VERDEX_DATABASE_DSN"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Local stand-in for a managed cloud database (e.g. RDS/Cloud SQL) --
  # a real cloud deployment replaces this service entirely and points
  # VERDEX_DATABASE_DSN at the managed instance instead. Present here
  # only so this compose file is runnable end to end for local
  # validation of the cloud tier's shape.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: verdex
      POSTGRES_USER: verdex
      POSTGRES_PASSWORD: "env://VERDEX_DATABASE_PASSWORD"
    volumes:
      - cloud_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdex"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  cloud_postgres_data: {}
