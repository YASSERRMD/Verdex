# infra/cloud/configmap.yaml
#
# Phase 094 (packages/iac): non-secret configuration for the cloud
# tier's gateway/router services. Every key is VERDEX_-prefixed,
# matching packages/config/env.go's EnvPrefix convention -- these are
# mounted as environment variables in k8s-deployment.yaml, never as
# literal values baked into an image. Secret values (DSNs, keys) are
# deliberately absent here; see secret-injection-plan.yaml for how
# those are wired in via a KMS/Secret reference instead of this
# ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: verdex-cloud-config
  namespace: verdex
  labels:
    app.kubernetes.io/part-of: verdex
    verdex.io/tier: cloud
data:
  VERDEX_PROFILE: "cloud"
  VERDEX_SERVER_PORT: "8080"
  VERDEX_METRICS_PORT: "9090"
  VERDEX_DATARESIDENCY_REGION: "eu-west-1"
